<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            margin: 0; padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevent scrollbars */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
        }

        /* --- SECURE LOGIN SCREEN --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; color: white;
        }
        #login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 15px;
            backdrop-filter: blur(10px); text-align: center;
        }
        input {
            padding: 10px; font-size: 16px;
            border-radius: 5px; border: none;
            width: 200px; margin-bottom: 15px;
        }
        button {
            padding: 10px 20px; font-size: 16px;
            cursor: pointer; background: #ff4757;
            color: white; border: none; border-radius: 5px;
        }

        /* --- MAIN CONTENT (Hidden initially) --- */
        #main-content { display: none; width: 100%; height: 100%; position: relative; }

        /* --- FIREWORKS BACKGROUND (Canvas) --- */
        #fireworks-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
        }

        /* Update total duration to 20s */
        .slide { 
            position: absolute; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            opacity: 0; 
            animation: fade 20s infinite linear; 
        }

        /* Set delays for 10 photos */
        .slide:nth-child(1) { animation-delay: 0s; background-image: url('1.jpg'); }
        .slide:nth-child(2) { animation-delay: 2s; background-image: url('2.jpg'); }
        .slide:nth-child(3) { animation-delay: 4s; background-image: url('3.jpg'); }
        .slide:nth-child(4) { animation-delay: 6s; background-image: url('4.jpg'); }
        .slide:nth-child(5) { animation-delay: 8s; background-image: url('5.jpg'); }
        .slide:nth-child(6) { animation-delay: 10s; background-image: url('6.jpg'); }
        .slide:nth-child(7) { animation-delay: 12s; background-image: url('7.jpg'); }
        .slide:nth-child(8) { animation-delay: 14s; background-image: url('8.jpg'); }
        .slide:nth-child(9) { animation-delay: 16s; background-image: url('9.jpg'); }

        @keyframes fade {
            0% { opacity: 0; }
            10% { opacity: 1; } /* Visible for 2s */
            20% { opacity: 0; } /* Fade out by 2s mark */
            100% { opacity: 0; }
        }

        /* --- WISHES & CANDLE OVERLAY --- */
        .overlay-content {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            text-align: center;
            width: 90%;
            pointer-events: none; /* Let clicks pass through */
        }
        h1 {
            color: #fff; font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .candle {
            font-size: 4rem;
            animation: flicker 1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- 1. The Security Login Logic -->
    <div id="login-overlay">
        <div id="login-box">
            <h2>Hey Buddy! 👋</h2>
            <p>Enter the special date (DDMMYYYY) to continue:</p>
            <input type="password" id="password-input" placeholder="Password">
            <br>
            <button onclick="checkPassword()">Enter</button>
            <p id="error-msg" style="color: #ff4757; display: none;">Incorrect date. Try again!</p>
        </div>
    </div>

    <!-- 2. The Main Content (Hidden until login succeeds) -->
    <div id="main-content">
        
        <!-- Fireworks Background -->
        <canvas id="fireworks-canvas"></canvas>
            <!-- Image Slideshow -->
            <div class="slideshow">
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            <div class="slide"></div>
            </div>

        <!-- Wishes and Candle -->
        <div class="overlay-content">
            <h1>Happy Birthday, Trisha.! 🎉</h1>
            <div class="candle">🕯️</div>
        </div>

    </div>

    <!-- JavaScript for Logic -->
    <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>
    <script>
        // --- SECURITY LOGIC ---
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            // SET YOUR PASSWORD HERE (e.g., 14021995 for Feb 14, 1995)
            const correctPassword = "YOUR_FRIENDS_BIRTHDATE"; 

            if (input === correctPassword) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                startFireworks();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // Allow pressing 'Enter' key to login
        document.getElementById("password-input")
            .addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });

        // --- FIREWORKS LOGIC ---
        function startFireworks() {
            const container = document.getElementById('fireworks-canvas');
            const fireworks = new Fireworks.default(container, {
                autoresize: true,
                opacity: 0.5,
                acceleration: 1.05,
                friction: 0.97,
                gravity: 1.5,
                particles: 50,
                trace: 3,
                explosion: 5,
                boundaries: {
                    top: 50, bottom: container.clientHeight - 50,
                    left: 50, right: container.clientWidth - 50
                },
                sound: {
                    enable: true,
                    files: [
                      'https://fireworks.js.org/sounds/explosion0.mp3',
                      'https://fireworks.js.org/sounds/explosion1.mp3',
                      'https://fireworks.js.org/sounds/explosion2.mp3'
                    ],
                    volume: { min: 4, max: 8 }
                }
            });
            fireworks.start();
        }
    </script>
</body>
</html>
